<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body{
            background-color: rgb(255, 255, 255);
        }
        div{
            background-color: rgb(237, 255, 179);
            width: 50%;
            height: 90px;
            margin: auto;
            padding: 10px;
            border-radius: 10px;
        }
        p{
            background-color: rgb(230, 248, 171);
            width: 75%;
            margin: auto;
            padding: 10px;
            border-radius: 10px;
            margin-top: 20px; 
        }
    </style>
    <title>Document</title>
</head>
<body>
    <div>
        <h1>Caracteristicas do nome:</h1>
    </div>
    <script>
        var nome = String(window.prompt('Digite seu nome completo'))
        document.write(`<p>Olá ${nome}! Seu nome tem ${nome.length} letras.</p>`)
        document.write(`<br><p>Seu nome em maiúsculo fica assim: ${nome.toUpperCase()}</p>`)
        document.write(`<br><p>Seu nome em minusculo é ${nome.toLowerCase}</p>`)
        
        </script>
