<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
    </style>
    <title>Nacionalidade</title>
</head>
<body>
    <h1>Nacionalidade</h1>
    <input type="text" name="pais" id="pais" placeholder="Digite o seu país de origem">
    <input type="button" value="verificar" onclick="verificar()">
    <div id="resultado">

    </div>
    <script>
        function verificar() {
            var pais = document.querySelector('input#pais')
            var resultado = document.querySelector('div#resultado')
            resultado.innerHTML = `<p>Vivendo em ${pais.value}</p>`
            if (pais.value == 'Brasil') {
                resultado.innerHTML += `<p>Voce é Brasileiro</p>`
            } else {
                resultado.innerHTML += `<p>Voce é Estrangeiro</p>`
            }
        }
    </script>
</body>
</html>
