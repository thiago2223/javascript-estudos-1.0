<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');
        body {
            font-family: 'Poppins', sans-serif;
            background-image: radial-gradient(circle, rgb(19, 5, 65) 0%, rgb(0, 0, 0) 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1{
            color: white;
        }
        input#pais {
            padding: 10px;
            margin: 10px;
            border-radius: 5px;
            border: none;
            font-size: 16px;
            width: 35vw;
        }
        input[type="button"] {
            padding: 10px 20px;
            border-radius: 5px;
            border: none;
            background-color: #4CAF50;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }
        div#resultado {
            margin-top: 20px;
            color: white;
            font-size: 18px;
        }
    </style>
    <title>Nacionalidade</title>
</head>
<body>
        <h1>Nacionalidade</h1>
        <input type="text" name="pais" id="pais" placeholder="Digite o seu país de origem">
        <input type="button" value="verificar" onclick="verificar()">
        <div id="resultado">
        </div>
    <script>
        function verificar() {
            var pais = document.querySelector('input#pais')
            var resultado = document.querySelector('div#resultado')
            resultado.innerHTML = `<p>Você vive em ${pais.value}</p>`
            if (pais.value == 'Brasil') {
                resultado.innerHTML += `<p>Voce é Brasileiro</p>`
            } else {
                resultado.innerHTML += `<p>Voce é Estrangeiro</p>`
            }
        }
    </script>
</body>
</html>
